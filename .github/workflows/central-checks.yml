name: Central PR Checks

on:
  workflow_call:

jobs:
  # ─────────────────────────────────────────────
  # 1. PR title follows Conventional Commits
  # ─────────────────────────────────────────────
  pr-title:
    name: PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — adjust to taste
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  # ─────────────────────────────────────────────
  # 2. All commits follow Conventional Commits
  # ─────────────────────────────────────────────
  commitlint:
    name: Commit Messages (commitlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: |
          npm install --save-dev \
            @commitlint/cli \
            @commitlint/config-conventional

      - name: Run commitlint on PR commits
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to   ${{ github.event.pull_request.head.sha }} \
            --verbose
        env:
          # Inline config — no commitlint.config.js needed in each repo
          COMMITLINT_CONFIG: |
            {"extends":["@commitlint/config-conventional"]}

      # Fallback: write config file if env-based config is not picked up
      - name: Write commitlint config if missing
        run: |
          if [ ! -f commitlint.config.js ] && [ ! -f .commitlintrc.json ]; then
            echo '{"extends":["@commitlint/config-conventional"]}' > .commitlintrc.json
          fi

  # ─────────────────────────────────────────────
  # 3. Secret scanning (gitleaks)
  # ─────────────────────────────────────────────
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for public repos

  # ─────────────────────────────────────────────
  # 4. License check (MIT, language-agnostic)
  # ─────────────────────────────────────────────
  license:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: LICENSE file must exist
        run: |
          if [ ! -f LICENSE ] && [ ! -f LICENSE.md ] && [ ! -f LICENSE.txt ]; then
            echo "❌ No LICENSE file found. All LibreCourseUY repos must include a LICENSE file."
            exit 1
          fi
          echo "✅ LICENSE file found."

      - name: LICENSE must declare MIT
        run: |
          LICENSE_FILE=$(ls LICENSE LICENSE.md LICENSE.txt 2>/dev/null | head -n1)
          if ! grep -qi "MIT" "$LICENSE_FILE"; then
            echo "❌ LICENSE file does not appear to be MIT. Found: $LICENSE_FILE"
            echo "Content preview:"
            head -5 "$LICENSE_FILE"
            exit 1
          fi
          echo "✅ MIT license confirmed in $LICENSE_FILE."

      - name: Setup Ruby for licensee
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install licensee
        run: gem install licensee

      - name: Run licensee
        run: |
          DETECTED=$(licensee detect --json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data.get('matched_license', 'UNKNOWN'))
          " 2>/dev/null || echo "UNKNOWN")

          echo "Detected license: $DETECTED"

          if [ "$DETECTED" != "MIT" ]; then
            echo "❌ licensee did not detect MIT (got: $DETECTED)."
            echo "Make sure your LICENSE file matches the standard MIT template."
            exit 1
          fi
          echo "✅ licensee confirmed MIT."
